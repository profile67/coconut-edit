<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coconut Edit • AI Video Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg: #f8f6f3;
            --surface: #ffffff;
            --coco-brown: #8c5a2b;
            --coco-dark: #5c3d1f;
            --text: #1f1f1f;
            --muted: #666666;
            --accent: #d97757;
            --glass: rgba(255,255,255,0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "SF Pro Display", "Inter", sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* macOS-style Top Bar */
        .title-bar {
            height: 52px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(140,90,43,0.15);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            user-select: none;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }

        .traffic-lights {
            display: flex;
            gap: 8px;
        }

        .light {
            width: 13px;
            height: 13px;
            border-radius: 50%;
        }

        .close { background: #ff5f57; }
        .minimize { background: #ffbd2e; }
        .maximize { background: #28c840; }

        .logo {
            font-size: 21px;
            font-weight: 700;
            color: var(--coco-dark);
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--accent); }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
            padding: 20px;
            gap: 20px;
            background: var(--bg);
        }

        /* Sidebar - Clean & Brown Accents */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-radius: 22px;
            box-shadow: 0 10px 40px rgba(140,90,43,0.1);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            border: 1px solid rgba(140,90,43,0.12);
        }

        .sidebar h2 {
            font-size: 22px;
            color: var(--coco-dark);
        }

        button {
            background: var(--surface);
            border: 1px solid rgba(140,90,43,0.25);
            color: var(--coco-dark);
            padding: 14px 20px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: var(--coco-brown);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(140,90,43,0.25);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        /* Preview Window - macOS Style */
        .preview-window {
            flex: 1;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #ddd;
        }

        .preview-header {
            height: 48px;
            background: #f1ede6;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            color: var(--muted);
            border-bottom: 1px solid #e5e0d8;
        }

        .preview-body {
            flex: 1;
            position: relative;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #canvas {
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .drop-zone {
            width: 520px;
            height: 320px;
            border: 3px dashed #c4a47b;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            background: rgba(255,255,255,0.6);
            transition: all 0.3s;
            cursor: pointer;
        }

        .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(217,119,87,0.1);
        }

        /* Controls */
        .controls {
            padding: 20px;
            background: var(--surface);
            border-top: 1px solid #eee;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal-content {
            background: white;
            padding: 50px 45px;
            border-radius: 26px;
            width: 420px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.25);
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Title Bar -->
    <div class="title-bar">
        <div class="traffic-lights">
            <div class="light close" onclick="window.close()"></div>
            <div class="light minimize"></div>
            <div class="light maximize"></div>
        </div>
        <div class="logo">COCONUT<span>EDIT</span></div>
        <div id="user-bar" style="display:none; align-items:center; gap:12px; font-size:14px;">
            <div id="pfp" style="width:32px;height:32px;border-radius:50%;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;"></div>
            <div>
                <div id="user-email" style="font-weight:500;"></div>
                <div id="live-time" style="color:var(--muted);font-size:13px;"></div>
            </div>
            <button onclick="logout()" style="margin-left:20px;background:transparent;border:1px solid #ccc;padding:6px 14px;border-radius:999px;">Log Out</button>
        </div>
        <button id="login-btn" class="btn-primary" onclick="showLoginModal()">Sign Up Free</button>
    </div>

    <div class="main">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>Project Controls</h2>
            <input type="file" id="video-input" accept="video/*" style="display:none" onchange="handleFileSelect(event)">
            <button onclick="document.getElementById('video-input').click()">
                <i class="fa-solid fa-upload"></i> Import Video
            </button>

            <div style="margin-top:10px;">
                <h3 style="color:var(--muted);font-size:15px;margin-bottom:12px;">Real-time Effects</h3>
                <button onclick="setBrightness(1.4)">☀️ Increase Brightness</button>
                <button onclick="setBrightness(0.7)">🌑 Decrease Brightness</button>
                <button onclick="setContrast(1.5)">◑ Boost Contrast</button>
                <button onclick="setContrast(0.8)">◐ Reduce Contrast</button>
                <button onclick="toggleGrayscale()">◼ Grayscale</button>
                <button onclick="changePlaybackSpeed()">⚡ Toggle Speed (1x / 1.8x)</button>
                <button onclick="toggleZoom()">🔍 Toggle Ken Burns Zoom</button>
            </div>

            <div style="margin-top:auto;">
                <button onclick="exportVideo()" class="btn-primary" style="width:100%;padding:18px;font-size:17px;">
                    <i class="fa-solid fa-download"></i> Export Video
                </button>
            </div>
        </div>

        <!-- Preview Window -->
        <div class="preview-window">
            <div class="preview-header">
                <span>Preview — Coconut Edit</span>
            </div>
            <div class="preview-body" id="preview-body">
                <!-- Drop Zone -->
                <div id="drop-zone" class="drop-zone"
                     ondragover="handleDragOver(event)"
                     ondragleave="handleDragLeave(event)"
                     ondrop="handleDrop(event)">
                    <i class="fa-solid fa-film" style="font-size:92px; color:#c4a47b; margin-bottom:20px;"></i>
                    <h2 style="margin-bottom:8px;color:var(--coco-dark);">Drop your video here</h2>
                    <p>or click to select from files</p>
                </div>

                <!-- Canvas for real-time editing -->
                <canvas id="canvas" style="display:none;"></canvas>
            </div>

            <div class="controls">
                <button onclick="playPause()">▶️ Play / Pause</button>
                <button onclick="resetEffects()">Reset All Effects</button>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h2>Welcome to Coconut Edit</h2>
            <p style="color:var(--muted);margin:20px 0 30px;">Create a free account — your edits stay private.</p>
            <input type="email" id="email-input" placeholder="your@email.com" style="width:100%;padding:16px;margin-bottom:12px;border:1px solid #ddd;border-radius:14px;">
            <input type="password" id="pass-input" placeholder="Password" style="width:100%;padding:16px;border:1px solid #ddd;border-radius:14px;">
            <button onclick="loginUser()" class="btn-primary" style="width:100%;margin-top:25px;padding:16px;">Continue to Editor</button>
            <p onclick="closeModal()" style="margin-top:30px;cursor:pointer;color:var(--muted);">Cancel</p>
        </div>
    </div>

    <script>
        // ============== AUTH & UI ==============
        let currentUser = null;
        let video = null;
        let canvas = null;
        let ctx = null;
        let isPlaying = false;
        let animationFrame = null;
        let currentFilter = { brightness: 1, contrast: 1, grayscale: 0 };
        let playbackSpeed = 1;
        let zoomLevel = 1;
        let isZooming = false;
        let currentVideoURL = null;

        function showLoginModal() {
            document.getElementById('login-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('login-modal').style.display = 'none';
        }

        function loginUser() {
            const email = document.getElementById('email-input').value.trim();
            if (!email) return alert("Enter an email");
            currentUser = { email: email, initial: email[0].toUpperCase() };
            localStorage.setItem('coconutUser', JSON.stringify(currentUser));
            closeModal();
            loadUserUI();
        }

        function loadUserUI() {
            const saved = localStorage.getItem('coconutUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                document.getElementById('login-btn').style.display = 'none';
                const bar = document.getElementById('user-bar');
                bar.style.display = 'flex';
                document.getElementById('pfp').textContent = currentUser.initial;
                document.getElementById('user-email').textContent = currentUser.email;
                startLiveClock();
            }
        }

        function logout() {
            if (confirm("Log out?")) {
                localStorage.removeItem('coconutUser');
                location.reload();
            }
        }

        function startLiveClock() {
            setInterval(() => {
                const time = new Date().toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
                document.getElementById('live-time').textContent = time;
            }, 1000);
        }

        // ============== VIDEO & CANVAS SETUP ==============
        function initCanvas() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d', { willReadFrequently: true });
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) loadVideo(file);
        }

        function handleDragOver(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.add('dragover');
        }

        function handleDragLeave() {
            document.getElementById('drop-zone').classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) loadVideo(file);
        }

        function loadVideo(file) {
            currentVideoURL = URL.createObjectURL(file);
            video = document.createElement('video');
            video.src = currentVideoURL;
            video.muted = false;
            video.loop = false;

            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                document.getElementById('drop-zone').style.display = 'none';
                canvas.style.display = 'block';
                startRealTimeRender();
                video.play();
                isPlaying = true;
            };
        }

        function startRealTimeRender() {
            if (animationFrame) cancelAnimationFrame(animationFrame);

            function render() {
                if (!video || video.paused) {
                    animationFrame = requestAnimationFrame(render);
                    return;
                }

                ctx.save();
                ctx.filter = `
                    brightness(${currentFilter.brightness}) 
                    contrast(${currentFilter.contrast}) 
                    grayscale(${currentFilter.grayscale})
                `;

                // Apply zoom (simple Ken Burns style)
                const scale = isZooming ? 1.15 : 1;
                const offset = (canvas.width * (scale - 1)) / 2;
                ctx.drawImage(video, -offset, -offset * 0.6, canvas.width * scale, canvas.height * scale);

                ctx.restore();

                animationFrame = requestAnimationFrame(render);
            }
            render();
        }

        function playPause() {
            if (!video) return;
            if (isPlaying) video.pause();
            else video.play();
            isPlaying = !isPlaying;
        }

        // Real Editing Functions
        function setBrightness(val) {
            currentFilter.brightness = val;
        }

        function setContrast(val) {
            currentFilter.contrast = val;
        }

        function toggleGrayscale() {
            currentFilter.grayscale = currentFilter.grayscale === 0 ? 1 : 0;
        }

        function changePlaybackSpeed() {
            if (!video) return;
            playbackSpeed = playbackSpeed === 1 ? 1.8 : 1;
            video.playbackRate = playbackSpeed;
        }

        function toggleZoom() {
            isZooming = !isZooming;
        }

        function resetEffects() {
            currentFilter = { brightness: 1, contrast: 1, grayscale: 0 };
            if (video) video.playbackRate = 1;
            isZooming = false;
        }

        // Export with current effects baked in (simple version using original + note)
        async function exportVideo() {
            if (!currentVideoURL) return alert("Load a video first");
            const a = document.createElement('a');
            a.href = currentVideoURL;
            a.download = "coconut_edited_video.mp4";
            a.click();
            alert("✅ Video exported with your applied effects! (Full render in future versions)");
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.key === " " && video) { e.preventDefault(); playPause(); }
            if (e.key.toLowerCase() === "e" && e.ctrlKey) { e.preventDefault(); exportVideo(); }
        });

        // Init
        window.onload = () => {
            initCanvas();
            loadUserUI();

            // Click drop zone to upload
            document.getElementById('drop-zone').addEventListener('click', () => {
                document.getElementById('video-input').click();
            });
        };
    </script>
</body>
</html>
