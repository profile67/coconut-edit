<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coconut Edit • Video Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');

        :root {
            --bg: #f8f6f3;
            --surface: #ffffff;
            --brown: #8c5a2b;
            --accent: #d97757;
            --text: #1f1f1f;
            --muted: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "SF Pro Display", sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .title-bar {
            height: 54px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            padding: 0 24px;
            justify-content: space-between;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }

        .logo { font-size: 22px; font-weight: 700; color: var(--brown); }
        .logo span { color: var(--accent); }

        .main {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .sidebar {
            width: 260px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(140,90,43,0.1);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .preview-window {
            flex: 1;
            background: white;
            border-radius: 22px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            padding: 12px 20px;
            background: #f5f2eb;
            border-bottom: 1px solid #eee;
            font-weight: 500;
            color: var(--brown);
        }

        .video-area {
            flex: 1;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        video, canvas {
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
        }

        .timeline {
            padding: 15px 20px;
            background: #f8f6f3;
            border-top: 1px solid #eee;
        }

        .timeline input {
            width: 100%;
            accent-color: var(--accent);
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            font-weight: 500;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="title-bar">
        <div class="logo">COCONUT<span>EDIT</span></div>
        <div id="user-info" style="display:none; align-items:center; gap:12px;">
            <div id="pfp" style="width:34px;height:34px;border-radius:50%;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;"></div>
            <div id="user-email" style="font-size:14px;"></div>
            <button onclick="logout()" style="margin-left:20px; background:transparent; border:1px solid #ccc; padding:6px 14px;">Log Out</button>
        </div>
        <button onclick="showLoginModal()" id="login-btn" class="btn-primary">Sign Up Free</button>
    </div>

    <div class="main">
        <!-- Sidebar - Useful Buttons -->
        <div class="sidebar">
            <h2 style="color:var(--brown);">Editing Tools</h2>

            <input type="file" id="video-upload" accept="video/*" style="display:none" onchange="loadVideoFile(event)">
            
            <button onclick="document.getElementById('video-upload').click()" style="width:100%;justify-content:center;">
                <i class="fa-solid fa-upload"></i> Import New Video
            </button>

            <button onclick="trimVideo()" style="width:100%;justify-content:center;background:#f0e6d2;">
                <i class="fa-solid fa-scissors"></i> Trim / Cut Video
            </button>

            <button onclick="togglePlay()" id="play-btn" style="width:100%;justify-content:center;" class="btn-primary">
                <i class="fa-solid fa-play"></i> <span id="play-text">Play</span>
            </button>

            <button onclick="resetAll()" style="width:100%;justify-content:center;">
                <i class="fa-solid fa-rotate-right"></i> Reset Everything
            </button>

            <div style="margin-top:20px;">
                <h3 style="color:var(--muted); margin-bottom:10px;">Quick Effects</h3>
                <button onclick="applyEffect('bright')" style="width:100%;">☀️ Brighten</button>
                <button onclick="applyEffect('dark')" style="width:100%;">🌑 Darken</button>
                <button onclick="applyEffect('contrast')" style="width:100%;">◑ Boost Contrast</button>
                <button onclick="applyEffect('gray')" style="width:100%;">◼ Grayscale</button>
            </div>

            <button onclick="exportVideo()" class="btn-primary" style="margin-top:auto;width:100%;padding:16px;">
                <i class="fa-solid fa-download"></i> Export Video
            </button>
        </div>

        <!-- Main Preview -->
        <div class="preview-window">
            <div class="preview-header">
                Video Preview — Coconut Edit
            </div>
            <div class="video-area" id="video-area">
                <div id="drop-zone" style="text-align:center; color:#888; cursor:pointer;" onclick="document.getElementById('video-upload').click()">
                    <i class="fa-solid fa-film" style="font-size:80px; margin-bottom:20px; color:#c4a47b;"></i>
                    <h3>Drop video here or click to import</h3>
                </div>
                <video id="player" style="display:none;" controls></video>
            </div>

            <div class="timeline">
                <input type="range" id="seek-bar" min="0" value="0" step="0.1" style="width:100%;">
                <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:13px;color:var(--muted);">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="status" id="status"></div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000;">
        <div style="background:white;padding:50px 45px;border-radius:24px;width:400px;text-align:center;">
            <h2>Coconut Edit</h2>
            <p style="margin:20px 0;color:var(--muted);">Sign up to save your projects</p>
            <input type="email" id="email" placeholder="your@email.com" style="width:100%;padding:14px;margin:10px 0;border:1px solid #ddd;border-radius:12px;">
            <button onclick="handleLogin()" class="btn-primary" style="width:100%;padding:14px;margin-top:15px;">Continue</button>
        </div>
    </div>

    <script>
        let video = null;
        let currentURL = null;
        let isPlaying = false;
        let trimStart = 0;
        let trimEnd = 0;
        let savedProject = null;

        // Load saved project
        function loadSavedProject() {
            savedProject = JSON.parse(localStorage.getItem('coconutProject'));
            if (savedProject && savedProject.url) {
                // In real app we would reload blob, but for demo we just alert
                document.getElementById('status').textContent = "Last project loaded";
            }
        }

        function handleLogin() {
            const email = document.getElementById('email').value.trim();
            if (email) {
                document.getElementById('login-modal').style.display = 'none';
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('user-email').textContent = email;
                document.getElementById('pfp').textContent = email[0].toUpperCase();
            }
        }

        function logout() {
            if (confirm("Log out?")) location.reload();
        }

        function showLoginModal() {
            document.getElementById('login-modal').style.display = 'flex';
        }

        function loadVideoFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            currentURL = URL.createObjectURL(file);
            video = document.getElementById('player');
            video.src = currentURL;
            video.style.display = 'block';
            document.getElementById('drop-zone').style.display = 'none';

            video.onloadedmetadata = () => {
                trimEnd = video.duration;
                document.getElementById('duration').textContent = formatTime(video.duration);
                updateSeekBar();
            };

            video.ontimeupdate = updateSeekBar;
            saveProject();
        }

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function updateSeekBar() {
            const seek = document.getElementById('seek-bar');
            if (video) {
                seek.value = video.currentTime;
                document.getElementById('current-time').textContent = formatTime(video.currentTime);
            }
        }

        function togglePlay() {
            if (!video) return;
            if (isPlaying) {
                video.pause();
                document.getElementById('play-text').innerHTML = '<i class="fa-solid fa-play"></i> Play';
                document.getElementById('status').textContent = "Paused!";
            } else {
                video.play();
                document.getElementById('play-text').innerHTML = '<i class="fa-solid fa-pause"></i> Pause';
                document.getElementById('status').textContent = "Playing!";
            }
            isPlaying = !isPlaying;
        }

        function trimVideo() {
            if (!video) return alert("Load a video first!");
            const start = prompt("Start time (seconds):", trimStart);
            const end = prompt("End time (seconds):", trimEnd || video.duration);
            if (start !== null && end !== null) {
                trimStart = parseFloat(start);
                trimEnd = parseFloat(end);
                video.currentTime = trimStart;
                document.getElementById('status').textContent = `Trimmed: ${trimStart}s to ${trimEnd}s`;
                saveProject();
            }
        }

        function applyEffect(type) {
            if (!video) return;
            if (type === 'bright') video.style.filter = 'brightness(1.4)';
            else if (type === 'dark') video.style.filter = 'brightness(0.7)';
            else if (type === 'contrast') video.style.filter = 'contrast(1.6)';
            else if (type === 'gray') video.style.filter = 'grayscale(1)';
            document.getElementById('status').textContent = type.toUpperCase() + " effect applied";
        }

        function resetAll() {
            if (video) {
                video.style.filter = 'none';
                video.currentTime = 0;
            }
            document.getElementById('status').textContent = "All effects reset";
        }

        function exportVideo() {
            if (!currentURL) return alert("No video to export");
            const a = document.createElement('a');
            a.href = currentURL;
            a.download = "coconut_edited_video.mp4";
            a.click();
            document.getElementById('status').textContent = "Video downloaded!";
        }

        function saveProject() {
            if (currentURL) {
                localStorage.setItem('coconutProject', JSON.stringify({
                    url: currentURL,
                    trimStart: trimStart,
                    trimEnd: trimEnd
                }));
            }
        }

        // Seek bar control
        document.addEventListener('DOMContentLoaded', () => {
            const seek = document.getElementById('seek-bar');
            seek.addEventListener('input', () => {
                if (video) video.currentTime = parseFloat(seek.value);
            });

            loadSavedProject();
        });
    </script>
</body>
</html>
